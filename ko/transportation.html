    <title>UCI Mountain Bike World Series</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
</head>
<body>
    <div id="wrap" class="transportation">
    <header>
        <div class="header-inner">
            <div class="inner">
                <div class="logo">
                    <a href="/">
                        <img src="/images/img_logo.jpg" alt="UCI Mountain Bike World Series">
                    </a>
                </div>
                <div class="nav-overlay"></div>
                <div class="nav">
                    <nav>
                        <ul>
                            <li class=""><a data-href="/main.html">Home</a></li>
                            <li class="active"><a data-href="/transportation.html">Transportation</a></li>
                            <li><a href="https://2026uciteam.mice.link/booking/PHBERZF" target="_blank">Accomodation</a></li>
                        </ul>
                    </nav>
                    <div class="language">
                        <ul>
                            <li class="active"><a href="/ko/transportation.html"><span>KR</span></a></li>
                            <li class=""><a href="/en/transportation.html"><span>EN</span></a></li>
                        </ul>
                    </div>
                </div>
                <div class="util">
                    <button type="button" class="btn-menu">
                        <span class="bar"></span>
                        <span class="bar"></span>
                        <span class="bar"></span>
                    </button>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="main-inner">
            <section class="sct-hero-sub">
                <div class="bg">
                    <img src="/images/sub/bg_transportation_hero.jpg" alt="">
                </div>
                <div class="text">
                    <div class="inner">
                        <div class="title">Transportation</div>
                        <div class="description">Optimal vehicle and logistics solutions for the 2026 UCI MTB World Series.</div>
                    </div>
                </div>
            </section>
            <section class="sct-transport">
                <div class="inner">
                    <div class="tab-button">
                        <ul>
                            <li class="active">
                                <div>
                                    <button type="button">
                                        <span class="code">SERVICE 01</span>
                                        <span class="name">ONE-WAY</span>
                                    </button>
                                </div>
                            </li>
                            <li>
                                <div>
                                    <button type="button">
                                        <span class="code">SERVICE 02</span>
                                        <span class="name">CHARTER SERVICE</span>
                                    </button>
                                </div>
                            </li>
                            <li>
                                <div>
                                    <button type="button">
                                        <span class="code">SERVICE 03</span>
                                        <span class="name">RENTAL CAR</span>
                                    </button>
                                </div>
                            </li>
                            <li>
                                <div>
                                    <button type="button">
                                        <span class="code">SERVICE 04</span>
                                        <span class="name">LOCAL COORDINATOR</span>
                                    </button>
                                </div>
                            </li>
                        </ul>
                    </div>
                    <div class="tab-content">
                        <div class="tab-description">
                            <!-- JavaScript에서 동적으로 렌더링 -->
                        </div>
                        <div class="tab-list">
                            <ul>
                                <!-- JavaScript에서 동적으로 렌더링 -->
                            </ul>
                        </div>
                    </div>
                </div>
            </section>
            <section class="sct-contact-us">
                <div class="inner">
                    <div class="contact-button">
                        <a href="javascript:void(0)" onclick="openModal('contact-us')"><img src="/images/sub/ico_mail.svg" alt=""><span>Request a quote and make a booking</span></a>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <footer>
        <div class="footer-inner">
            <div class="inner">
                <div class="contact">
                    <p>Contact: <a href="mailto:hospitality@groundk.com">hospitality@groundk.com</a></p>
                </div>
                <div class="copyright">
                    <p>Copyright &copy; GroundK. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>
    <div class="modal" id="contact-us">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <div class="title">CONTACT US</div>
                <button type="button" class="btn-close"><img src="/images/common/ico_close.svg" alt=""></button>
            </div>
            <div class="modal-body">
                <div class="form-wrap">
                    <div class="form-group">
                        <label for="contact-team-country">Team/Country</label>
                        <div class="input-group">
                            <input type="text" id="contact-team-country" name="team_country" placeholder="e.g., Team name / Country name">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="contact-name">Name</label>
                        <div class="input-group">
                            <input type="text" id="contact-name" name="name" placeholder="e.g., Steve Rogers">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="contact-email">Email</label>
                        <div class="input-group">
                            <input type="email" id="contact-email" name="email">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="contact-phone">Phone</label>
                        <div class="input-group">
                            <input type="tel" id="contact-phone-code" name="phone_code" placeholder="+ Code">
                            <input type="tel" id="contact-phone-number" name="phone_number" placeholder="e.g., 1012345678">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="contact-service-type">Service Type</label>
                        <div class="input-group">
                            <select id="contact-service-type" name="service_type" required>
                                <option value="" disabled selected>Select a service</option>
                                <option value="Airport Transfer (One-way)">Airport Transfer (One-way)</option>
                                <option value="Daily Charter">Daily Charter</option>
                                <option value="Vehicle Rental">Vehicle Rental</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group-wrap">
                        <div class="form-group">
                            <label for="contact-passengers">Passengers</label>
                            <div class="input-group">
                                <input type="tel" id="contact-passengers" name="passengers" placeholder="0">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="contact-luggages">Luggages</label>
                            <div class="input-group">
                                <input type="tel" id="contact-luggages" name="luggages" placeholder="0">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="contact-bicycles">Bicycles</label>
                            <div class="input-group">
                                <input type="tel" id="contact-bicycles" name="bicycles" placeholder="0">
                            </div>
                        </div>
                    </div>
                    <div class="form-group full">
                        <label for="contact-message">Message</label>
                        <div class="input-group">
                            <textarea id="contact-message" name="message" placeholder="Please enter your enquiry."></textarea>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel">Cancel</button>
                <button type="button" class="btn-send" id="contact-submit">Send Message</button>
            </div>
        </div>
    </div>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/pages/common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="/js/pages/transportation.js"></script>
</body>
</html>
